<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Tester - MyFinanceFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [v-cloak] { display: none; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .toast-enter-active, .toast-leave-active { transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast-enter-from, .toast-leave-to { opacity: 0; transform: translateX(50px) scale(0.9); }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

<div id="authApp" v-cloak class="w-full flex justify-center items-center h-full">
    
    <transition name="toast">
        <div v-if="notif.show" 
             class="fixed top-6 right-6 md:right-8 z-[9999] px-6 py-4 rounded-2xl shadow-2xl text-white font-bold text-sm flex items-center gap-3 backdrop-blur-md"
             :class="notif.type === 'success' ? 'bg-emerald-500/90 border border-emerald-400' : 'bg-rose-500/90 border border-rose-400'">
            <span v-if="notif.type === 'success'" class="text-xl">✅</span>
            <span v-else class="text-xl">⚠️</span>
            {{ notif.message }}
        </div>
    </transition>

    <div class="w-full max-w-md bg-white rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] p-8 relative overflow-hidden animate-fade-in z-10">
        
        <!-- BADGE TESTER VERSION -->
        <div class="absolute top-4 right-4 bg-gradient-to-r from-orange-400 to-rose-500 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-md animate-pulse z-50">
            TESTER VERSION
        </div>

        <div class="absolute -right-16 -top-16 w-40 h-40 bg-blue-50 rounded-full blur-3xl opacity-60"></div>
        <div class="absolute -left-16 -bottom-16 w-40 h-40 bg-indigo-50 rounded-full blur-3xl opacity-60"></div>

        <div class="text-center mt-2 mb-8 relative z-10">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner border border-blue-100">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <!-- PERUBAHAN WARNA JUDUL ADA DI SINI -->
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">MyFinance<span class="text-blue-600">Flow</span></h1>
            <p class="text-sm text-slate-500 mt-2 font-medium">{{ mode === 'login' ? 'Otorisasi Akses Manajemen Finansial' : 'Pemulihan Kredensial Akses' }}</p>
        </div>

        <form v-if="mode === 'login'" @submit.prevent="doLogin" class="space-y-5 relative z-10">
            <div>
                <label class="text-[10px] uppercase font-bold text-slate-400 ml-2 tracking-widest">Username</label>
                <input type="text" v-model="formLogin.username" required class="w-full px-5 py-4 mt-1 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all duration-300 font-semibold text-slate-700" placeholder="Masukkan username">
            </div>
            <div>
                <label class="text-[10px] uppercase font-bold text-slate-400 ml-2 tracking-widest">Password</label>
                <input type="password" v-model="formLogin.password" required class="w-full px-5 py-4 mt-1 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all duration-300 font-semibold text-slate-700" placeholder="••••••••">
            </div>
            <button type="submit" :disabled="isLoading" class="w-full bg-blue-600 hover:bg-blue-700 hover:-translate-y-1 text-white font-extrabold py-4 rounded-2xl transition-all duration-300 shadow-lg shadow-blue-500/30 flex justify-center items-center gap-2 mt-2">
                <span v-if="isLoading" class="animate-spin border-2 border-white border-t-transparent rounded-full w-5 h-5"></span>
                {{ isLoading ? 'Memverifikasi...' : 'Masuk Ke Sistem' }}
            </button>
            <div class="text-center mt-5 pt-4 border-t border-slate-100">
                <button type="button" @click="mode = 'forgot'" class="text-xs text-slate-400 hover:text-blue-600 font-bold transition-colors duration-300">Lupa kredensial akses?</button>
            </div>
        </form>

        <form v-if="mode === 'forgot'" @submit.prevent="doReset" class="space-y-5 relative z-10">
            <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100 mb-2">
                <p class="text-xs text-orange-700 font-medium text-center">Sistem akan mengirimkan data kredensial ke alamat email di basis data.</p>
            </div>
            <div>
                <label class="text-[10px] uppercase font-bold text-slate-400 ml-2 tracking-widest">Email Terdaftar</label>
                <input type="email" v-model="formReset.email" required placeholder="nama@email.com" class="w-full px-5 py-4 mt-1 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-orange-500 focus:bg-white outline-none transition-all duration-300 font-semibold text-slate-700">
            </div>
            <button type="submit" :disabled="isLoading" class="w-full bg-orange-500 hover:bg-orange-600 hover:-translate-y-1 text-white font-extrabold py-4 rounded-2xl transition-all duration-300 shadow-lg shadow-orange-500/30 flex justify-center items-center gap-2">
                <span v-if="isLoading" class="animate-spin border-2 border-white border-t-transparent rounded-full w-5 h-5"></span>
                {{ isLoading ? 'Memproses Pengiriman...' : 'Kirim Pemulihan' }}
            </button>
            <div class="text-center mt-5 pt-4 border-t border-slate-100">
                <button type="button" @click="mode = 'login'" class="text-xs text-slate-400 hover:text-slate-700 font-bold transition-colors duration-300">← Kembali ke Halaman Login</button>
            </div>
        </form>
    </div>
</div>

<script>
const { createApp, ref, onMounted } = Vue;
createApp({
    setup() {
        // WAJIB GANTI: Pastikan URL ini adalah URL Apps Script versi Tester Anda
        const API_URL = "https://script.google.com/macros/s/AKfycbzp6zM5uITwLzjT5Ft9bbo9r1p6-WwaX7AxPTj9qP0hIggamQ2WUqg8Va--kPLtBciYZw/exec"; 
        const mode = ref('login'); 
        const isLoading = ref(false);
        const formLogin = ref({ username: '', password: '' });
        const formReset = ref({ email: '' });
        const notif = ref({ show: false, message: '', type: 'success' });

        const showNotif = (msg, type = 'success') => {
            notif.value = { show: true, message: msg, type: type };
            setTimeout(() => { notif.value.show = false; }, 3500);
        };

        // Pengecekan token menggunakan kunci khusus tester
        onMounted(() => { if(localStorage.getItem('ff_token_tester')) window.location.href = 'dashboard.html'; });

        const doLogin = async () => {
            isLoading.value = true;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', ...formLogin.value }) });
                const response = await res.json();
                if (response.status === 'success') {
                    showNotif('Otorisasi berhasil! Mengalihkan...', 'success');
                    // Menyimpan token dengan kunci khusus tester
                    localStorage.setItem('ff_token_tester', response.token);
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    showNotif(response.message || 'Kredensial tidak valid!', 'error');
                    formLogin.value.password = '';
                }
            } catch (e) { showNotif("Server tidak merespons.", 'error'); } finally { isLoading.value = false; }
        };

        const doReset = async () => {
            isLoading.value = true;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'forgot_password', email: formReset.value.email }) });
                const response = await res.json();
                if (response.status === 'success') {
                    showNotif(response.message || 'Email pemulihan terkirim!', 'success');
                    formReset.value.email = '';
                    setTimeout(() => { mode.value = 'login'; }, 2500);
                } else { showNotif(response.message || 'Email tidak terdaftar!', 'error'); }
            } catch (e) { showNotif("Gagal terhubung ke sistem.", 'error'); } finally { isLoading.value = false; }
        };

        return { mode, isLoading, formLogin, formReset, doLogin, doReset, notif };
    }
}).mount('#authApp');
</script>
</body>
</html>
